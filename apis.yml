- Prospect Management
- Data Enrichment
- Cold Email
apis:
- name: Snov.io Email Finder API
  description: Find and retrieve email addresses for prospects by domain, name, or
    LinkedIn profile URL. Supports domain search, name-based email lookup, LinkedIn
    profile enrichment, and generic company contact discovery. Operations follow an
    async start/result pattern.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://snov.io/email-finder-api
  baseURL: https://api.snov.io
  tags:
  - Email Finder
  - Domain Search
  - LinkedIn
  - Data Enrichment
  properties:
  - type: Documentation
    url: https://snov.io/api
  - type: OpenAPI
    url: openapi/snov-io-openapi.yml
  - url: graphql/snov-io-graphql.md
    type: GraphQL
- name: Snov.io Email Verification API
  description: Verify the deliverability and validity of up to 10 email addresses
    per request using a two-step async API. Returns validity status, MX record checks,
    and disposable email detection results.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://snov.io/email-verification-api
  baseURL: https://api.snov.io
  tags:
  - Email Verification
  - Email Validation
  properties:
  - type: Documentation
    url: https://snov.io/api
- name: Snov.io Campaigns API
  description: Create, update, delete, and manage multi-channel outreach campaigns
    programmatically. Supports email step content management, recipient management,
    campaign state changes, and full analytics reporting including opens, clicks,
    and replies.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://snov.io/api
  baseURL: https://api.snov.io
  tags:
  - Campaigns
  - Email Outreach
  - Drip Campaigns
  - Analytics
  properties:
  - type: Documentation
    url: https://snov.io/api
- name: Snov.io Prospect Management API
  description: Add, search, and manage prospect records and lists within Snov.io.
    Supports custom fields, list creation, CRM pipeline management, and do-not-email
    suppression list operations.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://snov.io/api
  baseURL: https://api.snov.io
  tags:
  - Prospects
  - CRM
  - Contact Management
  properties:
  - type: Documentation
    url: https://snov.io/api
- name: Snov.io Email Warm-up API
  description: Create and manage email warm-up campaigns to improve deliverability
    scores. Supports full CRUD operations on warm-up campaigns and provides statistical
    reporting on warm-up progress.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://snov.io/api
  baseURL: https://api.snov.io
  tags:
  - Email Warm-up
  - Deliverability
  properties:
  - type: Documentation
    url: https://snov.io/api
- name: Snov.io Webhooks API
  description: Subscribe to real-time event notifications from the Snov.io platform.
    Supports listing, creating, updating, and deleting webhook subscriptions for automated
    event-driven integrations.
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://snov.io/api
  baseURL: https://api.snov.io
  tags:
  - Webhooks
  - Events
  properties:
  - type: Documentation
    url: https://snov.io/api
