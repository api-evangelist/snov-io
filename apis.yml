description: Snov.io is a sales automation and lead generation platform serving over
  300,000 companies across 180+ countries. The platform provides a REST API enabling
  developers to programmatically access email finding, domain search, email verification,
  drip campaign management, and LinkedIn prospect automation. Authentication uses
  OAuth 2.0 client credentials to obtain short-lived Bearer tokens, and all API operations
  consume credits from the account balance. The API covers the full sales outreach
  lifecycle from prospect discovery and contact enrichment through multi-channel campaign
  execution and CRM pipeline management.
